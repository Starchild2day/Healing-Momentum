<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Healing Momentum</title>
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Healing Momentum">
<meta name="theme-color" content="#1a4028">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a4028;
    --navy-light: #245534;
    --gold: #c9923a;
    --gold-light: #e8b86d;
    --gold-pale: #fdf3e3;
    --cream: #faf6ef;
    --white: #fffdf8;
    --text: #2c1810;
    --text-mid: #4a3428;
    --text-light: #8a7a6a;
    --border: #d4c4a8;
    --success: #2d7a4f;
    --radius: 16px;
    --shadow: 0 4px 24px rgba(26,64,40,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; font-family: 'Source Sans 3', sans-serif; background: var(--cream); color: var(--text); font-size: 18px; }

  /* SCREENS */
  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* GATE SCREEN */
  #gate {
    background: linear-gradient(160deg, #1a4028 0%, #245534 100%);
    align-items: center; justify-content: center; padding: 2rem 1.5rem;
  }
  .gate-card {
    background: var(--white); border-radius: 24px; padding: 1.5rem 1.2rem;
    width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  .gate-logo {
    text-align: center; margin-bottom: 2rem;
  }
  .gate-logo .pulse-ring {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--gold-pale); border: 3px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1rem; font-size: 32px;
  }
  .gate-logo h1 {
    
    font-size: 2rem; color: var(--navy); line-height: 1.2;
  }
  .gate-logo p {
    font-size: 1rem; color: var(--text-mid); margin-top: 0.4rem;
  }
  .gate-tabs {
    display: flex; background: var(--cream); border-radius: 10px;
    padding: 4px; margin-bottom: 1.5rem; gap: 4px;
  }
  .gate-tab {
    flex: 1; padding: 0.6rem; border: none; background: transparent;
    border-radius: 8px; font-size: 1rem; color: var(--text-mid);
    cursor: pointer; font-family: 'Source Sans 3', sans-serif; font-weight: 500;
    transition: all 0.2s;
  }
  .gate-tab.active { background: var(--white); color: var(--navy); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .gate-form { display: flex; flex-direction: column; gap: 1rem; }
  .gate-form input, .gate-form select {
    width: 100%; padding: 0.9rem 1rem; border: 1.5px solid var(--border);
    border-radius: 10px; font-size: 1.1rem; font-family: 'Source Sans 3', sans-serif;
    color: var(--text); background: var(--white); transition: border-color 0.2s;
    appearance: none;
  }
  .gate-form input:focus, .gate-form select:focus {
    outline: none; border-color: var(--gold);
  }
  .beta-row { display: flex; gap: 8px; }
  .beta-row input { flex: 1; }
  .beta-apply {
    padding: 0.9rem 1rem; background: var(--cream); border: 1.5px solid var(--border);
    border-radius: 10px; font-size: 1rem; color: var(--text-mid);
    cursor: pointer; font-family: 'Source Sans 3', sans-serif; white-space: nowrap;
    transition: all 0.2s;
  }
  .beta-apply:hover { border-color: var(--gold); color: var(--gold); }
  .code-msg { font-size: 0.95rem; min-height: 1.2rem; padding-left: 4px; }
  .code-msg.valid { color: var(--success); }
  .code-msg.invalid { color: #c0392b; }
  .gate-btn {
    width: 100%; padding: 1rem; background: var(--gold);
    border: none; border-radius: 12px; color: var(--white);
    font-size: 1.2rem; font-weight: 600; cursor: pointer;
    font-family: 'Source Sans 3', sans-serif; transition: background 0.2s;
    margin-top: 0.5rem;
  }
  .gate-btn:hover { background: var(--gold-light); }
  .gate-note { text-align: center; font-size: 0.9rem; color: var(--text-light); margin-top: 1rem; }

  /* INJURY SCREEN */
  #injury-select {
    background: linear-gradient(160deg, #f0ebe0 0%, #faf6ef 100%); align-items: center; justify-content: center; padding: 2rem 1.5rem;
  }
  .injury-card {
    background: var(--white); border-radius: 24px; padding: 1.5rem 1.2rem;
    width: 100%; max-width: 420px; box-shadow: var(--shadow);
  }
  .injury-card h2 {
     font-size: 1.6rem;
    color: var(--navy); margin-bottom: 0.4rem;
  }
  .injury-card p { font-size: 0.9rem; color: var(--text-mid); margin-bottom: 1.5rem; }
  .injury-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; }
  .injury-option {
    display: flex; align-items: center; gap: 1rem; padding: 1rem 1.2rem;
    border: 2px solid var(--border); border-radius: 12px; cursor: pointer;
    transition: all 0.2s; background: var(--white);
  }
  .injury-option:hover { border-color: var(--gold); background: var(--gold-pale); }
  .injury-option.selected { border-color: var(--gold); background: var(--gold-pale); }
  .injury-icon { font-size: 1.8rem; width: 40px; text-align: center; }
  .injury-label { font-size: 1.1rem; font-weight: 500; color: var(--navy); }
  .injury-sub { font-size: 0.95rem; color: var(--text-mid); }
  .injury-btn {
    width: 100%; padding: 1rem; background: var(--navy);
    border: none; border-radius: 12px; color: var(--white);
    font-size: 1.05rem; font-weight: 600; cursor: pointer;
    font-family: 'Source Sans 3', sans-serif; transition: background 0.2s;
  }
  .injury-btn:hover { background: var(--navy-light); }
  .injury-btn:disabled { background: var(--border); cursor: not-allowed; }

  /* APP SCREEN */
  #app { background: var(--cream); flex-direction: column; }

  .app-header {
    background: linear-gradient(160deg, #1a4028 0%, #2d6b45 100%); padding: 1.5rem 1.5rem 1.2rem;
    color: var(--white);
  }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
  .greeting { font-size: 1rem; color: rgba(255,255,255,0.65); }
  .header-name { font-size: 1.8rem; margin-top: 2px; }
  .streak-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(201,146,58,0.25); border: 1px solid var(--gold);
    border-radius: 20px; padding: 6px 12px;
  }
  .streak-num { font-size: 1.2rem; font-weight: 600; color: var(--gold-light); }
  .streak-label { font-size: 0.85rem; color: var(--gold-light); }

  .progress-ring-wrap {
    display: flex; flex-direction: column; align-items: center; padding: 1.5rem 0 1rem;
  }
  .ring-container { position: relative; width: 120px; height: 120px; }
  .ring-svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: rgba(255,255,255,0.15); stroke-width: 10; }
  .ring-fill { fill: none; stroke: var(--gold); stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
  .ring-center {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    text-align: center;
  }
  .ring-pct { font-size: 1.8rem; font-weight: 600; color: var(--white); }
  .ring-done { font-size: 0.9rem; color: rgba(255,255,255,0.6); }
  .quote-wrap { padding: 0 1.5rem 1.5rem; }
  .quote {
    background: rgba(255,255,255,0.08); border-left: 3px solid var(--gold);
    border-radius: 0 8px 8px 0; padding: 0.8rem 1rem;
    font-size: 1rem; color: rgba(255,255,255,0.8); font-style: italic; line-height: 1.5;
  }

  .app-body { flex: 1; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; overflow-y: auto; background: #f5efe4; }

  .section-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .section-header {
    display: flex; align-items: center; gap: 10px;
    padding: 1rem 1.2rem; border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none;
    background: #f5f0e8;
  }
  .section-icon { font-size: 1.3rem; }
  .section-title { font-size: 1.2rem; font-weight: 600; color: var(--navy); flex: 1; }
  .section-progress { font-size: 0.9rem; color: var(--text-light); }
  .section-arrow { font-size: 1rem; color: var(--text-light); transition: transform 0.2s; }
  .section-arrow.open { transform: rotate(180deg); }
  .section-items { display: none; }
  .section-items.open { display: block; }

  .task-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 0.9rem 1.2rem; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.15s;
  }
  .task-item:last-child { border-bottom: none; }
  .task-item:hover { background: var(--cream); }
  .task-item.done { background: #e8f5ee; }
  .task-check {
    width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid var(--border); flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; background: var(--white);
  }
  .task-item.done .task-check { background: var(--success); border-color: var(--success); }
  .task-check-inner { width: 10px; height: 10px; border-radius: 50%; background: var(--white); opacity: 0; transition: opacity 0.2s; }
  .task-item.done .task-check-inner { opacity: 1; }
  .task-info { flex: 1; }
  .task-name { font-size: 1.1rem; font-weight: 600; color: var(--navy); margin-bottom: 4px; transition: color 0.2s; }
  .task-item.done .task-name { color: var(--text-light); text-decoration: line-through; }
  .task-desc { font-size: 0.95rem; color: var(--text-mid); line-height: 1.5; }
  .task-timer {
    display: flex; align-items: center; gap: 4px;
    font-size: 0.9rem; color: var(--gold); font-weight: 500;
    background: var(--gold-pale); padding: 3px 8px; border-radius: 20px;
    flex-shrink: 0; cursor: pointer; border: none; font-family: 'Source Sans 3', sans-serif;
    margin-top: 2px;
  }
  .task-timer.running { background: #fff3e0; color: #e65100; }
  .task-timer.done-t { background: #f0faf5; color: var(--success); }

  .encourage-bar {
    background: var(--navy); border-radius: var(--radius);
    padding: 1.2rem 1.5rem; text-align: center;
  }
  .encourage-bar p { color: rgba(255,255,255,0.9); font-size: 0.9rem; line-height: 1.5; }
  .encourage-bar strong { color: var(--gold-light); }

  //* TIMER — floating bottom bar, non-blocking */
  .modal-overlay {
    display: none; position: fixed; bottom: 0; left: 0; right: 0;
    z-index: 100; padding: 0;
  }
  .modal-overlay.active { display: block; }
  .modal {
    background: var(--navy); border-radius: 20px 20px 0 0; padding: 1rem 1.5rem;
    width: 100%; box-shadow: 0 -4px 24px rgba(0,0,0,0.25);
    display: flex; align-items: center; gap: 1rem;
  }
  .modal-left { flex: 1; text-align: left; min-width: 0; }
  .modal h3 { font-size: 1rem; font-weight: 700; color: #ffffff; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .modal-sub { font-size: 0.8rem; color: rgba(255,255,255,0.6); margin: 0; }
  .timer-display {
    font-size: 2.2rem; font-weight: 700; color: #e8b86d;
    font-family: 'Source Sans 3', sans-serif; letter-spacing: 0.02em;
    white-space: nowrap; flex-shrink: 0;
  }
  .timer-ring-wrap { display: none; }
  .modal-btns { display: flex; gap: 8px; flex-shrink: 0; }
  .modal-btn {
    padding: 0.6rem 1rem; border-radius: 10px; border: none;
    font-size: 0.85rem; font-weight: 600; cursor: pointer;
    font-family: 'Source Sans 3', sans-serif; transition: all 0.2s;
    white-space: nowrap;
  }
  .modal-btn.primary { background: #c9923a; color: #ffffff; }
  .modal-btn.primary:hover { background: #e8b86d; }
  .modal-btn.secondary { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); }
